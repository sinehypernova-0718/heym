version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    groups:
      python-ai-sdks:
        applies-to: "security-updates"
        patterns:
          - "openai"
          - "mcp"
          - "tiktoken"
          - "qdrant-client"
      python-web-stack:
        applies-to: "security-updates"
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "sqlalchemy*"
          - "asyncpg"
          - "httpx"
      python-dev-tools:
        applies-to: "security-updates"
        patterns:
          - "pytest"
          - "ruff"

  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "04:15"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    ignore:
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@vitejs/*"
        update-types:
          - "version-update:semver-major"
    groups:
      frontend-vue-stack:
        applies-to: "security-updates"
        patterns:
          - "vue"
          - "vue-router"
          - "pinia"
          - "@vue*"
          - "@vue-flow*"
          - "radix-vue"
      frontend-build-tools:
        applies-to: "security-updates"
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "vue-tsc"
          - "eslint*"
          - "@vue/eslint-config-typescript"
      frontend-security-sensitive:
        applies-to: "security-updates"
        patterns:
          - "axios"
          - "dompurify"
          - "jszip"
          - "marked"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(docker-backend)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:45"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(docker-frontend)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:55"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(docker-release)"
      include: "scope"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(compose)"
      include: "scope"
    ignore:
      - dependency-name: "postgres"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
